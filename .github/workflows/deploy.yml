name: Deploy to Hosting

on:
    push:
      branches:
        - main

jobs:
    deploy:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v3

        - name: Deploy via SCP
          uses: appleboy/scp-action@master
          with:
            host: criketmail.com
            username: crikytqu
            key: ${{ secrets.SSH_KEY }}
            source: "index.html"
            target: "/home/crikytqu/public_html/"
